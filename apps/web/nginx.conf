server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # WebSocket upgrades for realtime (/api/ws → API /ws). Must be more specific
  # than the general /api/ block below.
  location /api/ws {
    proxy_pass http://api:8888/ws;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 86400s;
    proxy_send_timeout 86400s;
  }

  # Reverse-proxy the API. The trailing slash on proxy_pass strips the `/api`
  # prefix, so `/api/auth/login` reaches the API as `/auth/login` (same-origin,
  # no CORS). `api` is the compose service name.
  location /api/ {
    proxy_pass http://api:8888/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # SPA history fallback: serve index.html for client-side routes.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
